    <button class="fb active" data-cat="all" onclick="filterJournals('all',this)">ALL</button>

    <button class="fb" data-cat="civil" onclick="filterJournals('civil',this)">민사</button>
    <button class="fb" data-cat="admin" onclick="filterJournals('admin',this)">행정</button>
    <button class="fb" data-cat="family" onclick="filterJournals('family',this)">가사</button>
    <input type="text" class="search-input" id="journalSearch" placeholder="Search…" oninput="searchJournals(this.value)">
  </div>

  <div class="j-list" id="journalList"></div>
  <div class="empty" id="emptyMsg" style="display:none">아직 게시된 글이 없습니다.<br><span style="font-size:12px">관리자 페이지에서 첫 글을 등록해 주세요.</span></div>
</div>

<div id="footerSlot"></div>

<script src="assets/common.js"></script>
<script>
renderNav('journal');renderFooter();

let journals=[],curFilter="all",curSearch="";
function renderJournals(){
  const g=document.getElementById("journalList");
  const empty=document.getElementById("emptyMsg");
  const f=journals.filter(j=>{
    const key=(j.series||'').toLowerCase();
    const ms=curFilter==="all"||key===curFilter;
    const mq=!curSearch||(j.title||'').includes(curSearch)||(j.summary||'').includes(curSearch);
    return ms&&mq;
  });
  if(!f.length){g.innerHTML='';empty.style.display='block';return;}
  empty.style.display='none';
  g.innerHTML=f.map((j,i)=>{
    const lbl=SERIES_LABEL[j.series]||j.series||'';
    const sub=j.summary?`<span class="sub">${j.summary}</span>`:'';
    const n=String(i+1).padStart(2,'0');
    return `<a href="${articlePath(j)}" class="j-row"><div class="thumb"><img src="og/${j.id}.png" loading="lazy" decoding="async" alt=""></div><div class="num">${n}</div><div class="title">${j.title}${sub}</div><div class="cat"><span class="pri">${lbl}</span></div></a>`;
  }).join("");
}
function filterJournals(s,b){curFilter=s;document.querySelectorAll(".fb").forEach(x=>x.classList.remove("active"));b.classList.add("active");renderJournals();}
function searchJournals(v){curSearch=v;renderJournals();}
function applyUrlFilter(){
  const params=new URLSearchParams(location.search);
  const cat=params.get('cat')||params.get('series');
  if(!cat)return;
  const normalized=cat.toLowerCase();
  const btn=document.querySelector('.fb[data-cat="'+normalized+'"]');
  if(btn){document.querySelectorAll('.fb').forEach(x=>x.classList.remove('active'));btn.classList.add('active');curFilter=normalized;}
}
function applyUrlSearch(){
  const q=new URLSearchParams(location.search).get('q');
  if(!q)return;
  curSearch=q;
  const input=document.getElementById('journalSearch');
  if(input)input.value=q;
}
(async()=>{
  try{
    journals=await fetchPublicPosts();
    applyUrlFilter();
    applyUrlSearch();
    renderJournals();
  }catch(e){
    document.getElementById('emptyMsg').style.display='block';
    console.error(e);
  }
})();
</script>
